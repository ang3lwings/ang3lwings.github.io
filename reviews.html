<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оставить отзыв — Ang3lW1ngs</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(20, 16, 25, 0.7);
            --card-border: rgba(255, 192, 203, 0.25);
            --accent-pink: #ffb7c5;
            --discord-color: #5865F2;
            --star-color: #ffd700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,183,197,0.12), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(88,101,242,0.12), transparent 40%),
                #0b0810;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 0 25px rgba(255,182,193,0.05);
        }
        .title {
            font-family: 'Press Start 2P', monospace;
            font-size: 15px;
            line-height: 1.6;
            color: var(--accent-pink);
            text-shadow: 3px 3px 0 #1e1a24;
            margin-bottom: 22px;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 18px;
            transition: 0.2s;
        }
        .back-link:hover { color: #fff; }

        .discord-login-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--discord-color);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }
        .discord-login-btn:hover { filter: brightness(1.12); box-shadow: 0 0 22px rgba(88,101,242,0.5); }
        .discord-login-btn svg { width: 22px; height: 22px; fill: #fff; }

        .hint { text-align: center; font-size: 12.5px; color: rgba(255,255,255,0.5); margin-top: 16px; line-height: 1.5; }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .user-bar img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent-pink); }
        .user-bar .uname { font-weight: 700; font-size: 15px; flex: 1; }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover { border-color: var(--accent-pink); color: var(--accent-pink); }

        .field-label { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 8px; display: block; }

        .stars-pick { display: flex; gap: 6px; margin-bottom: 20px; }
        .stars-pick span {
            font-size: 30px;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            transition: 0.15s;
        }
        .stars-pick span.active, .stars-pick span.hover {
            color: var(--star-color);
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        textarea {
            width: 100%;
            min-height: 110px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--accent-pink); }
        textarea::placeholder { color: rgba(255,255,255,0.35); }

        .submit-btn {
            width: 100%;
            background: var(--accent-pink);
            color: #0b0810;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover { box-shadow: 0 0 22px rgba(255,183,197,0.5); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-msg { text-align: center; font-size: 13px; margin-top: 14px; min-height: 18px; }
        .status-msg.ok { color: #7ee787; }
        .status-msg.err { color: #ff7b72; }

        .hidden { display: none !important; }
        .existing-note {
            background: rgba(255,183,197,0.1);
            border: 1px solid rgba(255,183,197,0.25);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            color: var(--accent-pink);
            margin-bottom: 18px;
            line-height: 1.5;
        }

        .music-status-badge {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 16, 25, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            cursor: pointer;
        }
        .music-waves { display: flex; align-items: flex-end; gap: 2px; width: 14px; height: 12px; }
        .wave-bar { width: 2px; height: 100%; background-color: var(--accent-pink); border-radius: 1px; animation: bounce 0.8s ease-in-out infinite alternate; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0% { height: 20%; } 100% { height: 100%; } }
        .music-status-badge.paused .wave-bar { animation-play-state: paused; height: 30%; }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="back-link">← Назад к профилю</a>
        <div class="title">ОТЗЫВ</div>

        <!-- Состояние: не авторизован -->
        <div id="logged-out">
            <button class="discord-login-btn" id="login-btn">
                <svg viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.31,60,73.31,53s5-12.74,11.43-12.74S96.33,46,96.22,53,91.08,65.69,84.69,65.69Z"/></svg>
                Войти через Discord
            </button>
            <p class="hint">Войдите, чтобы оставить отзыв.<br>Ник и аватар подтянутся из Discord автоматически.</p>
        </div>

        <!-- Состояние: авторизован -->
        <div id="logged-in" class="hidden">
            <div class="user-bar">
                <img id="user-avatar" src="" alt="avatar">
                <span class="uname" id="user-name"></span>
                <button class="logout-btn" id="logout-btn">Выйти</button>
            </div>

            <div id="existing-note" class="existing-note hidden">
                У вас уже есть отзыв — изменения перезапишут его.
            </div>

            <label class="field-label">Оценка</label>
            <div class="stars-pick" id="stars-pick">
                <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
            </div>

            <label class="field-label">Текст отзыва</label>
            <textarea id="review-text" placeholder="Напишите пару слов..."></textarea>

            <button class="submit-btn" id="submit-btn">Опубликовать отзыв</button>
            <div class="status-msg" id="status-msg"></div>
        </div>
    </div>

    <!-- Музыка (продолжается с главной страницы) -->
    <div class="music-status-badge paused" id="music-status-corner">
        <div class="music-waves">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <span id="status-badge-text">Музыка: Выкл</span>
    </div>
    <audio id="bg-music" loop>
        <source src="https://lmusic.kz/api/download/213743" type="audio/mpeg">
    </audio>

    <script>
        // --- Продолжение музыки с главной страницы ---
        const bgMusic = document.getElementById('bg-music');
        const musicBadge = document.getElementById('music-status-corner');
        const musicBadgeText = document.getElementById('status-badge-text');
        bgMusic.volume = 0.08;

        function syncMusicUI(isPlaying) {
            if (isPlaying) { musicBadge.classList.remove('paused'); musicBadgeText.innerText = "Музыка: Вкл"; }
            else { musicBadge.classList.add('paused'); musicBadgeText.innerText = "Музыка: Выкл"; }
        }

        // Восстановить позицию и состояние
        const savedTime = parseFloat(localStorage.getItem('music_time') || '0');
        if (savedTime) { try { bgMusic.currentTime = savedTime; } catch (e) {} }
        const wasPlaying = localStorage.getItem('music_playing') === 'true';

        function startMusic() { bgMusic.play().then(() => syncMusicUI(true)).catch(() => syncMusicUI(false)); }

        if (wasPlaying) {
            startMusic();
            // Если браузер заблокировал автозапуск — стартуем при первом действии
            document.addEventListener('click', () => { if (bgMusic.paused) startMusic(); }, { once: true });
        }

        musicBadge.addEventListener('click', (e) => {
            e.stopPropagation();
            if (bgMusic.paused) { startMusic(); } else { bgMusic.pause(); syncMusicUI(false); }
        });

        // Сохранять позицию для возврата на главную
        setInterval(() => {
            localStorage.setItem('music_time', bgMusic.currentTime);
            localStorage.setItem('music_playing', String(!bgMusic.paused));
        }, 1000);
    </script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // === НАСТРОЙКИ (те же, что в index.html) ===
        const SUPABASE_URL = 'https://hqmrwwnimuyvsnxnimzg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_PS7Z_S1FdxH3XYu5Z10tRA_IciS0eJ_'; // sb_publishable_...
        // ===========================================

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const loggedOut = document.getElementById('logged-out');
        const loggedIn = document.getElementById('logged-in');
        const statusMsg = document.getElementById('status-msg');
        let currentRating = 0;
        let currentUser = null;

        // --- Выбор звёзд ---
        const starsPick = document.getElementById('stars-pick');
        const stars = [...starsPick.querySelectorAll('span')];
        function paintStars(n) { stars.forEach(s => s.classList.toggle('active', +s.dataset.v <= n)); }
        stars.forEach(s => {
            s.addEventListener('mouseenter', () => stars.forEach(x => x.classList.toggle('hover', +x.dataset.v <= +s.dataset.v)));
            s.addEventListener('mouseleave', () => stars.forEach(x => x.classList.remove('hover')));
            s.addEventListener('click', () => { currentRating = +s.dataset.v; paintStars(currentRating); });
        });

        // --- Вход ---
        document.getElementById('login-btn').addEventListener('click', async () => {
            await supabase.auth.signInWithOAuth({
                provider: 'discord',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        });

        // --- Выход ---
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            showLoggedOut();
        });

        function showLoggedOut() {
            loggedIn.classList.add('hidden');
            loggedOut.classList.remove('hidden');
            currentUser = null;
        }

        async function showLoggedIn(user) {
            currentUser = user;
            const meta = user.user_metadata || {};
            const name = meta.full_name || meta.name || meta.user_name || 'Пользователь';
            const avatar = meta.avatar_url || meta.picture || 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('user-name').innerText = name;
            document.getElementById('user-avatar').src = avatar;
            loggedOut.classList.add('hidden');
            loggedIn.classList.remove('hidden');

            // Подтянуть существующий отзыв, если есть
            const { data } = await supabase.from('reviews').select('*').eq('user_id', user.id).maybeSingle();
            if (data) {
                document.getElementById('existing-note').classList.remove('hidden');
                document.getElementById('review-text').value = data.text;
                currentRating = data.rating;
                paintStars(currentRating);
            }
        }

        // --- Отправка отзыва (один отзыв на пользователя, перезапись) ---
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const text = document.getElementById('review-text').value.trim();
            statusMsg.className = 'status-msg';
            if (currentRating < 1) { statusMsg.classList.add('err'); statusMsg.innerText = 'Поставьте оценку.'; return; }
            if (text.length < 3) { statusMsg.classList.add('err'); statusMsg.innerText = 'Напишите текст отзыва.'; return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true; statusMsg.innerText = 'Отправка...';

            const meta = currentUser.user_metadata || {};
            const { error } = await supabase.from('reviews').upsert({
                user_id: currentUser.id,
                nickname: meta.full_name || meta.name || meta.user_name || 'Пользователь',
                avatar: meta.avatar_url || meta.picture || null,
                text,
                rating: currentRating
            }, { onConflict: 'user_id' });

            btn.disabled = false;
            if (error) {
                statusMsg.classList.add('err'); statusMsg.innerText = 'Ошибка: ' + error.message;
                console.error(error);
            } else {
                statusMsg.classList.add('ok'); statusMsg.innerText = 'Отзыв сохранён! Спасибо.';
                document.getElementById('existing-note').classList.remove('hidden');
            }
        });

        // --- Проверка сессии при загрузке (и после возврата с Discord) ---
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session && session.user) showLoggedIn(session.user);
            else showLoggedOut();
        });
        supabase.auth.onAuthStateChange((_event, session) => {
            if (session && session.user) showLoggedIn(session.user);
        });
    </script>
</body>
</html>
